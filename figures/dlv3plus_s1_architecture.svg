<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 750" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#333"/>
    </marker>
    <marker id="arr-b" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#2563EB"/>
    </marker>
    <marker id="arr-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#DC2626"/>
    </marker>
    <marker id="arr-p" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#7C3AED"/>
    </marker>
    <marker id="arr-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#059669"/>
    </marker>
    <marker id="arr-o" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#D97706"/>
    </marker>
    <marker id="arr-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#9CA3AF"/>
    </marker>
    <linearGradient id="g-enc" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#DBEAFE"/>
      <stop offset="100%" style="stop-color:#BFDBFE"/>
    </linearGradient>
    <linearGradient id="g-dec" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E0E7FF"/>
      <stop offset="100%" style="stop-color:#C7D2FE"/>
    </linearGradient>
    <linearGradient id="g-proto" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#F3E8FF"/>
      <stop offset="100%" style="stop-color:#E9D5FF"/>
    </linearGradient>
    <linearGradient id="g-ema" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEE2E2"/>
      <stop offset="100%" style="stop-color:#FECACA"/>
    </linearGradient>
    <linearGradient id="g-loss" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FEF3C7"/>
      <stop offset="100%" style="stop-color:#FDE68A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="750" rx="12" fill="#FAFAFA" stroke="#E5E7EB"/>

  <!-- Title -->
  <text x="550" y="35" text-anchor="middle" font-size="18" font-weight="bold" fill="#111827">Solution 1: DynAnchor in Encoder Space — DeepLabV3+ + ResNet-101</text>
  <text x="550" y="55" text-anchor="middle" font-size="12" fill="#6B7280">anchor_after_fusion = False  |  proto_to_decoder = Linear(2048, 512)</text>

  <!-- ============================================================ -->
  <!-- ENCODER: ResNet-101 -->
  <!-- ============================================================ -->
  <rect x="30" y="80" width="200" height="290" rx="8" fill="url(#g-enc)" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="130" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#1E40AF">ResNet-101 (d8)</text>

  <rect x="50" y="115" width="160" height="32" rx="5" fill="#fff" stroke="#93C5FD"/>
  <text x="130" y="136" text-anchor="middle" font-size="11" fill="#1E3A8A">Stage 0: 256-d  (1/4)</text>

  <rect x="50" y="155" width="160" height="32" rx="5" fill="#fff" stroke="#93C5FD"/>
  <text x="130" y="176" text-anchor="middle" font-size="11" fill="#1E3A8A">Stage 1: 512-d  (1/8)</text>

  <rect x="50" y="195" width="160" height="32" rx="5" fill="#fff" stroke="#93C5FD"/>
  <text x="130" y="216" text-anchor="middle" font-size="11" fill="#1E3A8A">Stage 2: 1024-d (1/8)</text>

  <rect x="50" y="235" width="160" height="32" rx="5" fill="#fff" stroke="#93C5FD"/>
  <text x="130" y="256" text-anchor="middle" font-size="11" fill="#1E3A8A">Stage 3: 2048-d (1/8)</text>

  <text x="130" y="290" text-anchor="middle" font-size="10" fill="#6B7280">dilations = (1, 1, 2, 4)</text>
  <text x="130" y="305" text-anchor="middle" font-size="10" fill="#6B7280">strides = (1, 2, 1, 1)</text>
  <text x="130" y="330" text-anchor="middle" font-size="9" fill="#9CA3AF">pretrained: resnet101_v1c</text>
  <text x="130" y="360" text-anchor="middle" font-size="10" fill="#3B82F6" font-style="italic">out_indices = (0, 1, 2, 3)</text>

  <!-- ============================================================ -->
  <!-- DECODER: DeepLabV3+ -->
  <!-- ============================================================ -->
  <rect x="280" y="80" width="250" height="290" rx="8" fill="url(#g-dec)" stroke="#6366F1" stroke-width="1.5"/>
  <text x="405" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#3730A3">DeepLabV3+ Decoder</text>

  <!-- ASPP block -->
  <rect x="300" y="115" width="210" height="55" rx="5" fill="#fff" stroke="#A5B4FC"/>
  <text x="405" y="133" text-anchor="middle" font-size="11" font-weight="bold" fill="#4338CA">ASPP (rates 1,12,24,36)</text>
  <text x="405" y="148" text-anchor="middle" font-size="10" fill="#6366F1">2048 → 5×512 → cat 2560</text>
  <text x="405" y="162" text-anchor="middle" font-size="10" fill="#6366F1">→ bottleneck → 512-d</text>

  <!-- c1 branch -->
  <rect x="300" y="180" width="210" height="35" rx="5" fill="#fff" stroke="#A5B4FC"/>
  <text x="405" y="202" text-anchor="middle" font-size="11" fill="#4338CA">c1: 256 → 48-d (low-level)</text>

  <!-- sep_bottleneck -->
  <rect x="300" y="225" width="210" height="35" rx="5" fill="#fff" stroke="#A5B4FC"/>
  <text x="405" y="247" text-anchor="middle" font-size="11" fill="#4338CA">sep_bottleneck: 560 → 512-d</text>

  <!-- conv_seg -->
  <rect x="325" y="275" width="160" height="35" rx="5" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="405" y="297" text-anchor="middle" font-size="11" font-weight="bold" fill="#3730A3">conv_seg: 512 → N_c</text>

  <text x="405" y="340" text-anchor="middle" font-size="10" fill="#6366F1">channels = 512</text>
  <text x="405" y="358" text-anchor="middle" font-size="9" fill="#9CA3AF">DepthwiseSeparableASPPHead</text>

  <!-- Arrow: encoder → ASPP (stage 3) -->
  <line x1="230" y1="251" x2="295" y2="142" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="258" y="182" font-size="9" fill="#6B7280" transform="rotate(-30,258,182)">2048-d</text>

  <!-- Arrow: encoder stage 0 → c1 -->
  <line x1="230" y1="131" x2="295" y2="197" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="258" y="175" font-size="9" fill="#6B7280">256-d</text>

  <!-- Arrow: ASPP → sep_bottleneck -->
  <line x1="405" y1="170" x2="405" y2="222" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Arrow: sep_bottleneck → conv_seg -->
  <line x1="405" y1="260" x2="405" y2="272" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ============================================================ -->
  <!-- DynAnchor Module (Encoder Space — 2048-d) -->
  <!-- ============================================================ -->
  <rect x="30" y="410" width="270" height="155" rx="8" fill="url(#g-proto)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="165" y="432" text-anchor="middle" font-size="13" font-weight="bold" fill="#5B21B6">DynamicAnchorModule</text>
  <text x="165" y="448" text-anchor="middle" font-size="10" fill="#7C3AED">operates in encoder space (2048-d)</text>

  <rect x="50" y="460" width="230" height="28" rx="4" fill="#fff" stroke="#C4B5FD"/>
  <text x="165" y="479" text-anchor="middle" font-size="10" fill="#5B21B6">Prototypes P ∈ ℝ^{K×2048}  (nn.Parameter)</text>

  <rect x="50" y="495" width="230" height="28" rx="4" fill="#fff" stroke="#C4B5FD"/>
  <text x="165" y="514" text-anchor="middle" font-size="10" fill="#5B21B6">EM Refinement (T=3 iters, τ=0.1)</text>

  <rect x="50" y="530" width="230" height="28" rx="4" fill="#fff" stroke="#C4B5FD"/>
  <text x="165" y="549" text-anchor="middle" font-size="10" fill="#5B21B6">Quality Gate → K' active prototypes</text>

  <!-- Arrow: encoder stage 3 → DynAnchor -->
  <path d="M130,275 L130,380 L130,405" fill="none" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="138" y="395" font-size="9" fill="#7C3AED">2048-d (stage 3)</text>

  <!-- ============================================================ -->
  <!-- Projection Bridge -->
  <!-- ============================================================ -->
  <rect x="340" y="430" width="190" height="55" rx="8" fill="#FDF4FF" stroke="#A855F7" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="435" y="452" text-anchor="middle" font-size="12" font-weight="bold" fill="#7E22CE">proto_to_decoder</text>
  <text x="435" y="470" text-anchor="middle" font-size="11" fill="#A855F7">Linear(2048, 512)</text>
  <text x="435" y="482" text-anchor="middle" font-size="9" fill="#9CA3AF">lr_mult=10, decay_mult=0</text>

  <!-- Arrow: DynAnchor → projection -->
  <line x1="300" y1="457" x2="335" y2="457" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="312" y="450" font-size="9" fill="#7C3AED">K×2048</text>

  <!-- Arrow: projection → conv_seg -->
  <path d="M435,485 L435,500 L405,500 L405,310" fill="none" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-p)"/>
  <text x="445" y="510" font-size="9" fill="#7C3AED">K×512 → conv_seg</text>

  <!-- ============================================================ -->
  <!-- EMA Teacher -->
  <!-- ============================================================ -->
  <rect x="580" y="80" width="220" height="100" rx="8" fill="url(#g-ema)" stroke="#DC2626" stroke-width="1.5"/>
  <text x="690" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#991B1B">EMA Teacher</text>
  <text x="690" y="120" text-anchor="middle" font-size="10" fill="#DC2626">ResNet-101 + DeepLabV3+ (frozen)</text>
  <text x="690" y="138" text-anchor="middle" font-size="10" fill="#DC2626">α = 0.999 momentum</text>
  <text x="690" y="158" text-anchor="middle" font-size="10" fill="#B91C1C">→ pseudo-label softmax p^tea</text>
  <text x="690" y="172" text-anchor="middle" font-size="9" fill="#9CA3AF">no gradients (detached)</text>

  <!-- Arrow: student → EMA (dashed) -->
  <path d="M530,200 L600,200 L600,180" fill="none" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arr-gray)"/>
  <text x="560" y="193" font-size="9" fill="#9CA3AF">EMA update</text>

  <!-- ============================================================ -->
  <!-- Proto Correction Block -->
  <!-- ============================================================ -->
  <rect x="580" y="210" width="220" height="120" rx="8" fill="url(#g-proto)" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="690" y="232" text-anchor="middle" font-size="12" font-weight="bold" fill="#5B21B6">Pseudo-Label Correction</text>
  <text x="690" y="252" text-anchor="middle" font-size="10" fill="#7C3AED">p̂_j = Σ a_ij · q_i</text>
  <text x="690" y="270" text-anchor="middle" font-size="10" fill="#7C3AED">q_i = softmax(conv_seg(W·P_i))</text>
  <text x="690" y="292" text-anchor="middle" font-size="11" fill="#5B21B6">p̃ = (1−α)p^tea + α·p̂</text>
  <text x="690" y="310" text-anchor="middle" font-size="9" fill="#9CA3AF">active after iter 1000</text>
  <text x="690" y="322" text-anchor="middle" font-size="9" fill="#9CA3AF">α = proto_correction_alpha = 0.5</text>

  <!-- Arrow: EMA → correction -->
  <line x1="690" y1="180" x2="690" y2="207" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <text x="700" y="198" font-size="9" fill="#DC2626">p^tea</text>

  <!-- Arrow: projection → correction -->
  <path d="M530,465 L560,465 L560,270 L577,270" fill="none" stroke="#7C3AED" stroke-width="1.5" marker-end="url(#arr-p)"/>
  <text x="540" y="350" font-size="9" fill="#7C3AED" transform="rotate(-90,540,350)">prototypes + assign</text>

  <!-- ============================================================ -->
  <!-- ClassMix -->
  <!-- ============================================================ -->
  <rect x="580" y="360" width="220" height="50" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="690" y="382" text-anchor="middle" font-size="12" font-weight="bold" fill="#065F46">ClassMix Augmentation</text>
  <text x="690" y="400" text-anchor="middle" font-size="10" fill="#059669">labeled patches → unlabeled</text>

  <!-- Arrow: correction → ClassMix -->
  <line x1="690" y1="330" x2="690" y2="357" stroke="#333" stroke-width="1" marker-end="url(#arr)"/>

  <!-- ============================================================ -->
  <!-- LOSSES -->
  <!-- ============================================================ -->
  <rect x="850" y="80" width="220" height="330" rx="8" fill="url(#g-loss)" stroke="#D97706" stroke-width="1.5"/>
  <text x="960" y="102" text-anchor="middle" font-size="13" font-weight="bold" fill="#92400E">Training Losses</text>

  <rect x="870" y="115" width="180" height="35" rx="5" fill="#fff" stroke="#FCD34D"/>
  <text x="960" y="137" text-anchor="middle" font-size="11" fill="#92400E">L_seg (labeled, CE)</text>

  <rect x="870" y="160" width="180" height="35" rx="5" fill="#fff" stroke="#FCD34D"/>
  <text x="960" y="182" text-anchor="middle" font-size="11" fill="#92400E">L_seg (mixed, CE)</text>

  <rect x="870" y="205" width="180" height="35" rx="5" fill="#fff" stroke="#FCD34D"/>
  <text x="960" y="227" text-anchor="middle" font-size="11" fill="#92400E">L_boundary (affinity)</text>

  <rect x="870" y="250" width="180" height="35" rx="5" fill="#fff" stroke="#FCD34D"/>
  <text x="960" y="272" text-anchor="middle" font-size="11" fill="#92400E">L_DAPG (proto grouping)</text>

  <rect x="870" y="300" width="180" height="35" rx="5" fill="#fff" stroke="#FCD34D"/>
  <text x="960" y="322" text-anchor="middle" font-size="11" fill="#92400E">L_corr (via blended p̃)</text>

  <text x="960" y="365" text-anchor="middle" font-size="10" fill="#92400E">λ_boundary = 0.5</text>
  <text x="960" y="380" text-anchor="middle" font-size="10" fill="#92400E">λ_proto = 0.1</text>
  <text x="960" y="395" text-anchor="middle" font-size="10" fill="#92400E">threshold = 0.968</text>

  <!-- Arrows to losses -->
  <line x1="530" y1="295" x2="867" y2="132" stroke="#D97706" stroke-width="1" marker-end="url(#arr-o)"/>
  <line x1="800" y1="385" x2="867" y2="177" stroke="#D97706" stroke-width="1" marker-end="url(#arr-o)"/>
  <line x1="800" y1="395" x2="867" y2="222" stroke="#D97706" stroke-width="1" marker-end="url(#arr-o)"/>
  <line x1="300" y1="540" x2="867" y2="267" stroke="#D97706" stroke-width="1" marker-end="url(#arr-o)"/>

  <!-- ============================================================ -->
  <!-- Optimizer Box -->
  <!-- ============================================================ -->
  <rect x="580" y="440" width="490" height="130" rx="8" fill="#F9FAFB" stroke="#6B7280" stroke-width="1"/>
  <text x="825" y="462" text-anchor="middle" font-size="12" font-weight="bold" fill="#374151">AdamW Optimizer (paramwise_cfg)</text>

  <text x="600" y="485" font-size="10" fill="#4B5563">backbone (ResNet-101):</text>
  <text x="810" y="485" font-size="10" fill="#059669">lr = 6e-5, decay = 0.01</text>

  <text x="600" y="502" font-size="10" fill="#4B5563">decode_head (DeepLabV3+):</text>
  <text x="810" y="502" font-size="10" fill="#059669">lr = 6e-4 (10×), decay = 0.01</text>

  <text x="600" y="519" font-size="10" fill="#4B5563">dynamic_anchor.prototypes:</text>
  <text x="810" y="519" font-size="10" fill="#7C3AED" font-weight="bold">lr = 6e-4 (10×), decay = 0</text>

  <text x="600" y="536" font-size="10" fill="#4B5563">proto_to_decoder (Linear):</text>
  <text x="810" y="536" font-size="10" fill="#7C3AED" font-weight="bold">lr = 6e-4 (10×), decay = 0</text>

  <text x="600" y="556" font-size="10" fill="#4B5563">Adam state reset at iter 1000:</text>
  <text x="810" y="556" font-size="10" fill="#DC2626" font-weight="bold">m=0, v=0 for Θ_proto ∪ Θ_proj</text>

  <!-- ============================================================ -->
  <!-- Dimension Trace Legend -->
  <!-- ============================================================ -->
  <rect x="30" y="590" width="1040" height="145" rx="8" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="1"/>
  <text x="550" y="612" text-anchor="middle" font-size="12" font-weight="bold" fill="#334155">Dimension Trace — Solution 1 (Encoder Space)</text>

  <!-- Encoder trace -->
  <rect x="55" y="628" width="100" height="28" rx="4" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="105" y="647" text-anchor="middle" font-size="10" fill="#1E40AF">ResNet-101</text>

  <text x="165" y="647" font-size="14" fill="#333">→</text>

  <rect x="180" y="628" width="125" height="28" rx="4" fill="#DBEAFE" stroke="#3B82F6"/>
  <text x="242" y="647" text-anchor="middle" font-size="10" fill="#1E40AF">[256,512,1024,2048]</text>

  <!-- DynAnchor path (encoder) -->
  <text x="315" y="647" font-size="14" fill="#7C3AED">→</text>

  <rect x="330" y="628" width="100" height="28" rx="4" fill="#F3E8FF" stroke="#7C3AED"/>
  <text x="380" y="647" text-anchor="middle" font-size="10" fill="#5B21B6">DynAnchor</text>

  <text x="440" y="647" font-size="14" fill="#7C3AED">→</text>

  <rect x="455" y="628" width="85" height="28" rx="4" fill="#F3E8FF" stroke="#7C3AED"/>
  <text x="497" y="647" text-anchor="middle" font-size="10" fill="#5B21B6">K × 2048</text>

  <text x="550" y="647" font-size="14" fill="#A855F7">→</text>

  <rect x="565" y="628" width="125" height="28" rx="4" fill="#FDF4FF" stroke="#A855F7" stroke-dasharray="4,2"/>
  <text x="627" y="647" text-anchor="middle" font-size="10" fill="#7E22CE">Linear(2048,512)</text>

  <text x="700" y="647" font-size="14" fill="#333">→</text>

  <rect x="715" y="628" width="85" height="28" rx="4" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="757" y="647" text-anchor="middle" font-size="10" fill="#3730A3">K × 512</text>

  <text x="810" y="647" font-size="14" fill="#333">→</text>

  <rect x="825" y="628" width="100" height="28" rx="4" fill="#EEF2FF" stroke="#6366F1" stroke-width="1.5"/>
  <text x="875" y="647" text-anchor="middle" font-size="10" fill="#3730A3">conv_seg</text>

  <text x="935" y="647" font-size="14" fill="#333">→</text>

  <rect x="950" y="628" width="70" height="28" rx="4" fill="#FEF3C7" stroke="#D97706"/>
  <text x="985" y="647" text-anchor="middle" font-size="10" fill="#92400E">N_c classes</text>

  <!-- Decoder path (separate) -->
  <text x="55" y="695" font-size="10" fill="#6B7280">Decoder path (independent):</text>
  <text x="215" y="695" font-size="10" fill="#4338CA">stages[3] (2048-d) → ASPP → 512 → cat c1(48) → sep_bottleneck → 512 → conv_seg → N_c</text>

  <text x="55" y="718" font-size="10" fill="#DC2626" font-style="italic">Key: DynAnchor gradients bypass decoder fusion — only encoder receives DAPG backprop</text>
</svg>
